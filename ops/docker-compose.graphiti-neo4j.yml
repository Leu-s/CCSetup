services:
  neo4j:
    image: neo4j:5.26
    container_name: graphiti-neo4j
    restart: unless-stopped
    ports:
      - "${GRAPHITI_BIND_HOST:-127.0.0.1}:7474:7474"
      - "${GRAPHITI_BIND_HOST:-127.0.0.1}:7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-demodemo}"
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - graphiti-neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-demodemo} 'RETURN 1;' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  graphiti-mcp:
    build:
      context: .
      dockerfile: ./graphiti-mcp.Dockerfile
      args:
        GRAPHITI_GIT_REF: "${GRAPHITI_GIT_REF:-mcp-v1.0.2}"
    container_name: graphiti-mcp
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${GRAPHITI_BIND_HOST:-127.0.0.1}:8000:8000"
    env_file:
      - path: ${HOME}/.claude/graphiti.neo4j.env
        required: false
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-demodemo}"
      GRAPHITI_TELEMETRY_ENABLED: "${GRAPHITI_TELEMETRY_ENABLED:-false}"
      SEMAPHORE_LIMIT: "${SEMAPHORE_LIMIT:-4}"
      GRAPHITI_MCP_CONFIG_PATH: "${GRAPHITI_MCP_CONFIG_PATH:-/graphiti-config/config-docker-neo4j.openai.yaml}"
    volumes:
      - ./config:/graphiti-config:ro
    command:
      - /bin/sh
      - -lc
      - uv run main.py --config "$$GRAPHITI_MCP_CONFIG_PATH" --transport http
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  graphiti-neo4j-data:
