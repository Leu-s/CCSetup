services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: graphiti-falkordb
    restart: unless-stopped
    ports:
      - "${GRAPHITI_BIND_HOST:-127.0.0.1}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  graphiti-mcp:
    build:
      context: .
      dockerfile: ./graphiti-mcp.Dockerfile
      args:
        GRAPHITI_GIT_REF: "${GRAPHITI_GIT_REF:-mcp-v1.0.2}"
    container_name: graphiti-mcp-falkor
    restart: unless-stopped
    depends_on:
      falkordb:
        condition: service_healthy
    ports:
      - "${GRAPHITI_BIND_HOST:-127.0.0.1}:8000:8000"
    env_file:
      - ./env/graphiti.falkordb.env
    environment:
      FALKORDB_URI: "redis://falkordb:6379"
      GRAPHITI_TELEMETRY_ENABLED: "${GRAPHITI_TELEMETRY_ENABLED:-false}"
      SEMAPHORE_LIMIT: "${SEMAPHORE_LIMIT:-1}"
      GRAPHITI_MCP_CONFIG_PATH: "${GRAPHITI_MCP_CONFIG_PATH:-/graphiti-config/config-docker-falkordb.openai.yaml}"
    volumes:
      - ./config:/graphiti-config:ro
    command:
      - /bin/sh
      - -lc
      - uv run main.py --config "$GRAPHITI_MCP_CONFIG_PATH" --transport http
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
